version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: paper-trading-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-paper_trading}
      MYSQL_USER: ${DB_USER:-paper_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-paperpass123}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - paper-trading-network

  redis:
    image: redis:7-alpine
    container_name: paper-trading-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 5
    networks:
      - paper-trading-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paper-trading-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Node environment
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      
      # Database configuration
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-paper_user}
      DB_PASSWORD: ${DB_PASSWORD:-paperpass123}
      DB_NAME: ${DB_NAME:-paper_trading}
      
      # Redis configuration
      REDIS_URL: redis://redis:6379
      
      # JWT and security
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      
      # Client configuration
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5173}
      
      # Admin/Trader credentials (change in production)
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@papertrading.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
      TRADER_PASSWORD: ${TRADER_PASSWORD:-Trader123!}
      
      # Optional: Enable crypto polling service
      ENABLE_CRYPTO_POLLING: ${ENABLE_CRYPTO_POLLING:-false}
      
      # API Keys (add if using external services)
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
      DHANHQ_API_KEY: ${DHANHQ_API_KEY:-}
    ports:
      - "${PORT:-4000}:4000"
    volumes:
      - ./src:/app/src
      - /app/node_modules
    networks:
      - paper-trading-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  paper-trading-network:
    driver: bridge
